reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      No central developer portal, self-service API program, open-data platform,
      or documented SSO/OAuth client registration was found for Tohoku University.
      The one clearly public, documented, machine-readable API is the TOUR
      institutional repository OAI-PMH 2.0 endpoint, which I verified live
      (Identify and ListMetadataFormats both returned valid OAI-PMH XML; formats
      include oai_dc, JPCOAR 1.0/2.0, DDI, LOM). The library OPAC is a public
      web search interface but no documented API was confirmed; the WEKO3 search
      endpoint returned HTTP 400 and is not cataloged as an API. Research code
      lives in lab GitHub orgs (e.g. cl-tohoku NLP group), not a central org.
      No endpoints were fabricated.
    endpoints:
      - url: https://tohoku.repo.nii.ac.jp/oai?verb=Identify
        status: 200
        note: Valid OAI-PMH Identify, repositoryName "Tohoku University Repository（TOUR）", protocol 2.0.
      - url: https://tohoku.repo.nii.ac.jp/oai?verb=ListMetadataFormats
        status: 200
        note: Returns oai_dc, jpcoar_1.0, jpcoar_2.0, ddi, lom metadata formats.
      - url: https://tohoku.repo.nii.ac.jp/
        status: 200
        note: TOUR repository human landing page (NII JAIRO Cloud / WEKO3).
      - url: https://www.tohoku.ac.jp/en/
